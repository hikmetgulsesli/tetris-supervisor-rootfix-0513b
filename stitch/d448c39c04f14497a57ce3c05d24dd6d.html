<style>
        .tetris-grid {
            display: grid;
            grid-template-columns: repeat(10, minmax(0, 1fr));
            grid-template-rows: repeat(20, minmax(0, 1fr));
            gap: 2px;
            aspect-ratio: 10/20;
            background-color: theme('colors.surface-container');
            border: 1px solid theme('colors.primary-container');
            padding: 2px;
        }
        .block-cell {
            background-color: theme('colors.background');
            border: 1px solid theme('colors.surface-container-high');
        }
        .block-active {
            background-color: theme('colors.secondary');
            box-shadow: 0 0 10px theme('colors.secondary-fixed-dim'), inset 0 0 5px theme('colors.secondary-fixed');
            border: 1px solid theme('colors.secondary-fixed');
        }
        .block-ghost {
            background-color: transparent;
            border: 1px dashed theme('colors.secondary');
        }
        .block-placed {
            background-color: theme('colors.primary-container');
            border: 1px solid theme('colors.outline-variant');
        }
        .hud-module {
            border: 1px solid theme('colors.primary-container');
            background-color: theme('colors.surface-container');
            padding: theme('spacing.md');
            position: relative;
        }
        .hud-label {
            position: absolute;
            top: -6px;
            left: 12px;
            background-color: theme('colors.background');
            padding: 0 4px;
            color: theme('colors.primary-fixed-dim');
        }
    </style>
</head>
