<body class="bg-background text-on-background min-h-screen relative overflow-hidden flex flex-col font-body-standard selection:bg-secondary selection:text-on-secondary">
<!-- Background Layer: Blurred Game Board -->
<div class="absolute inset-0 z-0 opacity-20 pointer-events-none" data-alt="A heavily blurred, abstract representation of a retro video game grid. The image features a dark slate background with faint, rectilinear shapes suggesting falling blocks. The overall aesthetic is highly textured, muted, and atmospheric, fitting perfectly as a subtle backdrop for a high-contrast dark mode arcade interface." style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuBbf7zG-dZpNHUF4oSSQQuCDALChBFbB44KDwCdzfWPb1JWhczk_NdGbInKrY4Aw2pdfEIR-xIqqxShMdHfhI_0TR7N8wygRxJgJZhr_Jbqob627beDRfQIZaGa-TvZ8Mt3df3cuXF1miBvORzMrwxKkefRrf17c7z9wSx1YZbvJ11z_UV3PeRr3AbmaXjTDdeqYMcstFNGKJkVBhYCEjgLR1z7mfByR0n_8QdFVEASEL0v5o1uPGrX_Y_bMJM1VflkmQOMSlef'); background-size: cover; background-position: center; filter: blur(8px) grayscale(100%);">
</div>
<!-- Main Content Canvas -->
<main class="relative z-10 flex-1 flex items-center justify-center p-md md:p-xl">
<div class="w-full max-w-2xl">
<!-- Game Over Container -->
<div class="bg-surface/90 border border-outline-variant p-lg md:p-xl shadow-2xl backdrop-blur-sm relative overflow-hidden group">
<!-- Decorative scanlines -->
<div class="absolute inset-0 pointer-events-none bg-[linear-gradient(rgba(255,255,255,0.03)_1px,transparent_1px)] bg-[length:100%_4px] opacity-30"></div>
<!-- Header -->
<div class="text-center mb-xl relative z-10">
<h1 class="font-display-arcade text-display-arcade text-error glow-error uppercase tracking-widest">GAME OVER</h1>
<p class="font-label-compact text-label-compact text-on-surface-variant mt-sm uppercase tracking-widest">Sequence Terminated</p>
</div>
<!-- Stats Bento Grid -->
<div class="grid grid-cols-1 md:grid-cols-3 gap-md mb-xl relative z-10">
<!-- Final Score -->
<div class="bg-surface-container-low border border-outline p-md flex flex-col items-center justify-center relative col-span-1 md:col-span-3">
<span class="absolute top-0 left-0 bg-background border-b border-r border-outline px-sm py-xs font-label-compact text-label-compact text-on-surface-variant uppercase">Final Score</span>
<div class="mt-lg font-display-arcade text-h1-hud text-on-surface">142,850</div>
<div class="font-label-compact text-label-compact text-secondary mt-xs flex items-center gap-xs">
<span class="material-symbols-outlined text-[16px]" style="font-variation-settings: 'FILL' 1;">trending_up</span>
                            NEW HIGH SCORE
                        </div>
</div>
<!-- Level Reached -->
<div class="bg-surface-container-low border border-outline-variant p-md flex flex-col items-center justify-center relative">
<span class="absolute top-0 left-0 bg-background border-b border-r border-outline-variant px-sm py-xs font-label-compact text-label-compact text-on-surface-variant uppercase">Level</span>
<div class="mt-lg font-data-mono text-data-mono text-primary">12</div>
</div>
<!-- Lines Cleared -->
<div class="bg-surface-container-low border border-outline-variant p-md flex flex-col items-center justify-center relative">
<span class="absolute top-0 left-0 bg-background border-b border-r border-outline-variant px-sm py-xs font-label-compact text-label-compact text-on-surface-variant uppercase">Lines</span>
<div class="mt-lg font-data-mono text-data-mono text-primary">104</div>
</div>
<!-- Tetris Rate -->
<div class="bg-surface-container-low border border-outline-variant p-md flex flex-col items-center justify-center relative">
<span class="absolute top-0 left-0 bg-background border-b border-r border-outline-variant px-sm py-xs font-label-compact text-label-compact text-on-surface-variant uppercase">Tetris Rate</span>
<div class="mt-lg font-data-mono text-data-mono text-primary">18%</div>
</div>
</div>
<!-- Actions -->
<div class="flex flex-col sm:flex-row gap-md relative z-10 justify-center">
<button class="bg-transparent border-[2px] border-secondary text-secondary hover:bg-secondary/10 px-lg py-md font-label-compact text-label-compact uppercase tracking-widest flex items-center justify-center gap-sm transition-colors duration-150 active:bg-secondary/30 glow-secondary focus:outline-none focus:ring-2 focus:ring-secondary focus:ring-offset-4 focus:ring-offset-background">
