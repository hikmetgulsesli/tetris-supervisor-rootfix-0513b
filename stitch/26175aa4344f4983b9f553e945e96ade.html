<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Game Options</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>

<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "primary-fixed-dim": "#b9c7e0",
                        "on-secondary-container": "#004119",
                        "error-container": "#93000a",
                        "surface-container-high": "#2a2a2b",
                        "on-primary-fixed-variant": "#3a485c",
                        "on-surface": "#e4e2e4",
                        "primary": "#b9c7e0",
                        "on-background": "#e4e2e4",
                        "tertiary-container": "#503d1e",
                        "surface-container": "#1f1f21",
                        "tertiary": "#dfc299",
                        "error": "#ffb4ab",
                        "on-secondary-fixed-variant": "#005321",
                        "inverse-primary": "#515f74",
                        "on-surface-variant": "#c5c6cd",
                        "inverse-surface": "#e4e2e4",
                        "secondary-fixed": "#6bff8f",
                        "on-tertiary-fixed-variant": "#574424",
                        "surface-container-highest": "#343536",
                        "surface-tint": "#b9c7e0",
                        "on-tertiary-container": "#c3a881",
                        "primary-container": "#334155",
                        "surface-variant": "#343536",
                        "surface": "#131315",
                        "on-secondary": "#003915",
                        "on-tertiary-fixed": "#281901",
                        "on-primary": "#233144",
                        "tertiary-fixed-dim": "#dfc299",
                        "tertiary-fixed": "#fcdeb3",
                        "surface-container-low": "#1b1b1d",
                        "inverse-on-surface": "#303032",
                        "primary-fixed": "#d5e3fd",
                        "outline": "#8e9197",
                        "surface-dim": "#131315",
                        "on-secondary-fixed": "#002109",
                        "surface-bright": "#39393b",
                        "surface-container-lowest": "#0e0e10",
                        "on-primary-fixed": "#0d1c2f",
                        "on-error-container": "#ffdad6",
                        "secondary-fixed-dim": "#4ae176",
                        "on-tertiary": "#3f2d10",
                        "on-error": "#690005",
                        "background": "#131315",
                        "secondary": "#4ae176",
                        "on-primary-container": "#9eadc5",
                        "secondary-container": "#00b954",
                        "outline-variant": "#44474c"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "grid-gap": "2px",
                        "unit": "4px",
                        "md": "16px",
                        "container-max": "1200px",
                        "sm": "8px",
                        "lg": "24px",
                        "xs": "4px",
                        "xl": "32px"
                    },
                    "fontFamily": {
                        "label-compact": ["JetBrains Mono"],
                        "display-arcade": ["Hanken Grotesk"],
                        "data-mono": ["JetBrains Mono"],
                        "h2-hud": ["Hanken Grotesk"],
                        "h1-hud": ["Hanken Grotesk"],
                        "body-standard": ["Inter"],
                        "body-bold": ["Inter"]
                    },
                    "fontSize": {
                        "label-compact": ["12px", { "lineHeight": "1", "letterSpacing": "0.05em", "fontWeight": "700" }],
                        "display-arcade": ["48px", { "lineHeight": "1.1", "letterSpacing": "-0.02em", "fontWeight": "800" }],
                        "data-mono": ["18px", { "lineHeight": "1", "fontWeight": "500" }],
                        "h2-hud": ["24px", { "lineHeight": "1.2", "fontWeight": "600" }],
                        "h1-hud": ["32px", { "lineHeight": "1.2", "fontWeight": "700" }],
                        "body-standard": ["16px", { "lineHeight": "1.5", "fontWeight": "400" }],
                        "body-bold": ["16px", { "lineHeight": "1.5", "fontWeight": "600" }]
                    }
                }
            }
        }
    </script>
<style>
        .glow-secondary { box-shadow: 0 0 10px rgba(74, 225, 118, 0.5); }
        .glow-text-secondary { text-shadow: 0 0 8px rgba(74, 225, 118, 0.6); }
        .focus-ring { outline: 2px solid #4ae176; outline-offset: 4px; }
        .switch-peer:checked ~ .switch-bg { background-color: #4ae176; }
        .switch-peer:checked ~ .switch-dot { transform: translateX(100%); background-color: #131315; }
    </style>
</head>
<body class="bg-background text-on-background font-body-standard min-h-screen flex flex-col pt-20 pl-0 md:pl-64 pb-20 md:pb-0">
<!-- TopAppBar (Suppressed for focused intent, but kept side nav if needed. The prompt says it's a settings menu. "Settings" is in the SideNavBar. We'll show SideNavBar and suppress TopAppBar to focus on settings content, per instructions: "If designing a user settings page, Profile is active." Wait, settings is in side nav.) -->
<!-- SideNavBar -->
<nav class="hidden md:flex flex-col bg-surface-container dark:bg-surface-container docked left-0 h-full w-64 border-r border-outline-variant dark:border-outline-variant fixed left-0 top-0 h-full z-40 pt-20">
<div class="px-md mb-xl">
<h1 class="font-display-arcade text-h2-hud text-primary dark:text-primary">SUPERVISOR_OS</h1>
<p class="font-label-compact text-label-compact text-on-surface-variant opacity-70 mt-sm">V2.04_STABLE</p>
</div>
<div class="flex flex-col gap-xs mt-lg">
<a class="flex items-center gap-md text-on-surface-variant px-md py-sm opacity-70 hover:bg-surface-container-highest dark:hover:bg-surface-container-highest" href="#">
<span class="material-symbols-outlined">terminal</span>
<span class="font-label-compact text-label-compact">Command</span>
</a>
<a class="flex items-center gap-md text-on-surface-variant px-md py-sm opacity-70 hover:bg-surface-container-highest dark:hover:bg-surface-container-highest" href="#">
<span class="material-symbols-outlined">leaderboard</span>
<span class="font-label-compact text-label-compact">Leaderboard</span>
</a>
<a class="flex items-center gap-md text-on-surface-variant px-md py-sm opacity-70 hover:bg-surface-container-highest dark:hover:bg-surface-container-highest" href="#">
<span class="material-symbols-outlined">history</span>
<span class="font-label-compact text-label-compact">Archive</span>
</a>
<a class="flex items-center gap-md border-l-4 border-secondary text-secondary bg-secondary/10 px-md py-sm hover:bg-surface-container-highest dark:hover:bg-surface-container-highest" href="#">
<span class="material-symbols-outlined">settings</span>
<span class="font-label-compact text-label-compact">Settings</span>
</a>
</div>
</nav>
<!-- Main Canvas -->
<main class="flex-grow p-lg md:p-xl flex justify-center items-start">
<div class="w-full max-w-container-max flex flex-col gap-lg">
<header class="mb-md">
<h2 class="font-h1-hud text-h1-hud text-on-surface uppercase tracking-widest glow-text-secondary border-b border-outline-variant pb-sm inline-block">Game Options</h2>
</header>
<div class="grid grid-cols-1 lg:grid-cols-2 gap-lg">
<!-- Sound Options -->
<div class="bg-surface border border-outline-variant p-md relative flex flex-col gap-md">
<span class="absolute -top-3 left-md bg-background px-sm font-label-compact text-label-compact text-on-surface-variant uppercase tracking-wider">Audio Systems</span>
<div class="flex justify-between items-center bg-surface-container p-sm border border-outline-variant">
<span class="font-data-mono text-data-mono text-on-surface">SFX Volume</span>
<label class="relative inline-flex items-center cursor-pointer">
<input checked="" class="sr-only switch-peer" type="checkbox"/>
<div class="switch-bg w-11 h-6 bg-surface-container-highest rounded-full border border-outline-variant transition-colors"></div>
<div class="switch-dot absolute left-[2px] top-[2px] w-5 h-5 bg-on-surface rounded-full transition-transform"></div>
</label>
</div>
<div class="flex justify-between items-center bg-surface-container p-sm border border-outline-variant">
<span class="font-data-mono text-data-mono text-on-surface">Music Track</span>
<label class="relative inline-flex items-center cursor-pointer">
<input checked="" class="sr-only switch-peer" type="checkbox"/>
<div class="switch-bg w-11 h-6 bg-surface-container-highest rounded-full border border-outline-variant transition-colors"></div>
<div class="switch-dot absolute left-[2px] top-[2px] w-5 h-5 bg-on-surface rounded-full transition-transform"></div>
</label>
</div>
</div>
<!-- Gameplay Options -->
<div class="bg-surface border border-outline-variant p-md relative flex flex-col gap-md">
<span class="absolute -top-3 left-md bg-background px-sm font-label-compact text-label-compact text-on-surface-variant uppercase tracking-wider">Gameplay Parameters</span>
<div class="flex flex-col gap-sm bg-surface-container p-sm border border-outline-variant">
<div class="flex justify-between items-center">
<span class="font-data-mono text-data-mono text-on-surface">Starting Level</span>
<span class="font-data-mono text-data-mono text-secondary">05</span>
</div>
<input class="w-full h-2 bg-surface-container-highest rounded-lg appearance-none cursor-pointer accent-secondary" max="15" min="1" type="range" value="5"/>
</div>
<div class="flex justify-between items-center bg-surface-container p-sm border border-outline-variant">
<span class="font-data-mono text-data-mono text-on-surface">Ghost Piece Projection</span>
<label class="relative inline-flex items-center cursor-pointer">
<input checked="" class="sr-only switch-peer" type="checkbox"/>
<div class="switch-bg w-11 h-6 bg-surface-container-highest rounded-full border border-outline-variant transition-colors"></div>
<div class="switch-dot absolute left-[2px] top-[2px] w-5 h-5 bg-on-surface rounded-full transition-transform"></div>
</label>
</div>
<div class="flex flex-col gap-sm bg-surface-container p-sm border border-outline-variant">
<div class="flex justify-between items-center">
<span class="font-data-mono text-data-mono text-on-surface">Control Sensitivity (ms)</span>
<span class="font-data-mono text-data-mono text-secondary">150</span>
</div>
<input class="w-full h-2 bg-surface-container-highest rounded-lg appearance-none cursor-pointer accent-secondary" max="300" min="50" type="range" value="150"/>
</div>
</div>
</div>
<div class="flex justify-end mt-lg">
<button class="bg-transparent border-2 border-secondary text-secondary font-label-compact text-label-compact px-xl py-sm uppercase tracking-widest hover:bg-secondary/10 transition-colors focus:outline-none focus:ring-2 focus:ring-secondary focus:ring-offset-2 focus:ring-offset-background active:bg-on-surface active:text-background">
                    Save &amp; Exit
                </button>
</div>
</div>
</main>
<!-- BottomNavBar (Mobile Only - Suppressed for Settings context if preferred, but rendering as per standard logic if required on mobile. Settings is not a top level destination in the bottom nav JSON (Rotate, Hold, Drop, Pause). So suppress BottomNavBar because we are in settings.) -->
</body></html>
