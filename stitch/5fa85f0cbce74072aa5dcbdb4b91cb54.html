<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Pause Overlay - TETRIS_SUPERVISOR</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@500;700&amp;family=Hanken+Grotesk:wght@600;700;800&amp;family=Inter:wght@400;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "primary-fixed-dim": "#b9c7e0",
                        "on-secondary-container": "#004119",
                        "error-container": "#93000a",
                        "surface-container-high": "#2a2a2b",
                        "on-primary-fixed-variant": "#3a485c",
                        "on-surface": "#e4e2e4",
                        "primary": "#b9c7e0",
                        "on-background": "#e4e2e4",
                        "tertiary-container": "#503d1e",
                        "surface-container": "#1f1f21",
                        "tertiary": "#dfc299",
                        "error": "#ffb4ab",
                        "on-secondary-fixed-variant": "#005321",
                        "inverse-primary": "#515f74",
                        "on-surface-variant": "#c5c6cd",
                        "inverse-surface": "#e4e2e4",
                        "secondary-fixed": "#6bff8f",
                        "on-tertiary-fixed-variant": "#574424",
                        "surface-container-highest": "#343536",
                        "surface-tint": "#b9c7e0",
                        "on-tertiary-container": "#c3a881",
                        "primary-container": "#334155",
                        "surface-variant": "#343536",
                        "surface": "#131315",
                        "on-secondary": "#003915",
                        "on-tertiary-fixed": "#281901",
                        "on-primary": "#233144",
                        "tertiary-fixed-dim": "#dfc299",
                        "tertiary-fixed": "#fcdeb3",
                        "surface-container-low": "#1b1b1d",
                        "inverse-on-surface": "#303032",
                        "primary-fixed": "#d5e3fd",
                        "outline": "#8e9197",
                        "surface-dim": "#131315",
                        "on-secondary-fixed": "#002109",
                        "surface-bright": "#39393b",
                        "surface-container-lowest": "#0e0e10",
                        "on-primary-fixed": "#0d1c2f",
                        "on-error-container": "#ffdad6",
                        "secondary-fixed-dim": "#4ae176",
                        "on-tertiary": "#3f2d10",
                        "on-error": "#690005",
                        "background": "#131315",
                        "secondary": "#4ae176",
                        "on-primary-container": "#9eadc5",
                        "secondary-container": "#00b954",
                        "outline-variant": "#44474c"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "grid-gap": "2px",
                        "unit": "4px",
                        "md": "16px",
                        "container-max": "1200px",
                        "sm": "8px",
                        "lg": "24px",
                        "xs": "4px",
                        "xl": "32px"
                    },
                    "fontFamily": {
                        "label-compact": ["JetBrains Mono"],
                        "display-arcade": ["Hanken Grotesk"],
                        "data-mono": ["JetBrains Mono"],
                        "h2-hud": ["Hanken Grotesk"],
                        "h1-hud": ["Hanken Grotesk"],
                        "body-standard": ["Inter"],
                        "body-bold": ["Inter"]
                    },
                    "fontSize": {
                        "label-compact": ["12px", { "lineHeight": "1", "letterSpacing": "0.05em", "fontWeight": "700" }],
                        "display-arcade": ["48px", { "lineHeight": "1.1", "letterSpacing": "-0.02em", "fontWeight": "800" }],
                        "data-mono": ["18px", { "lineHeight": "1", "fontWeight": "500" }],
                        "h2-hud": ["24px", { "lineHeight": "1.2", "fontWeight": "600" }],
                        "h1-hud": ["32px", { "lineHeight": "1.2", "fontWeight": "700" }],
                        "body-standard": ["16px", { "lineHeight": "1.5", "fontWeight": "400" }],
                        "body-bold": ["16px", { "lineHeight": "1.5", "fontWeight": "600" }]
                    }
                }
            }
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .material-symbols-outlined.fill {
            font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        
        /* Blurred background effect for modal */
        .modal-backdrop {
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
        }
        
        /* Neon/HUD borders */
        .hud-border {
            border: 1px solid theme('colors.primary-container');
        }
        
        .glow-success {
            box-shadow: 0 0 8px theme('colors.secondary-container'), inset 0 0 4px theme('colors.secondary-container');
        }
        
        /* Simulated Game Board Background Pattern */
        .game-grid-bg {
            background-size: 24px 24px;
            background-image: 
                linear-gradient(to right, theme('colors.surface-container-high') 1px, transparent 1px),
                linear-gradient(to bottom, theme('colors.surface-container-high') 1px, transparent 1px);
        }
    </style>
</head>
<body class="bg-background text-on-background min-h-screen flex flex-col font-body-standard relative overflow-hidden selection:bg-secondary/30 selection:text-secondary">
<!-- Simulated background canvas (The Game) -->
<div class="absolute inset-0 z-0 flex items-center justify-center p-xl game-grid-bg opacity-30">
<!-- Abstract representation of the game board in the background -->
<div class="w-full max-w-2xl h-[819px] border border-outline-variant rounded-lg flex flex-col p-lg gap-sm relative">
<div class="absolute inset-0 bg-gradient-to-b from-transparent to-surface-container-highest/50 rounded-lg"></div>
</div>
</div>
<!-- Pause Overlay Modal -->
<div class="fixed inset-0 z-50 flex items-center justify-center modal-backdrop bg-background/80 p-lg">
<!-- Modal Container -->
<div class="w-full max-w-md bg-surface-container border-2 border-primary-container rounded-lg p-xl flex flex-col items-center gap-xl relative shadow-2xl">
<!-- Modal Header -->
<div class="flex flex-col items-center gap-sm text-center w-full">
<span class="material-symbols-outlined text-4xl text-primary opacity-80 mb-sm">pause_circle</span>
<h1 class="font-display-arcade text-display-arcade text-secondary tracking-tighter drop-shadow-[0_0_8px_rgba(74,225,118,0.5)]">GAME PAUSED</h1>
<div class="h-px w-2/3 bg-gradient-to-r from-transparent via-primary-container to-transparent mt-xs"></div>
</div>
<!-- Secondary HUD Panel: Current Stats -->
<div class="w-full grid grid-cols-2 gap-md mt-sm">
<!-- Score Card -->
<div class="bg-surface border border-outline-variant p-md rounded flex flex-col gap-xs relative group overflow-hidden">
<div class="absolute top-0 left-0 w-full h-1 bg-surface-container-highest"></div>
<span class="font-label-compact text-label-compact text-on-surface-variant uppercase tracking-widest">SCORE</span>
<span class="font-data-mono text-data-mono text-primary group-hover:text-primary-fixed transition-colors">042,890</span>
</div>
<!-- Level Card -->
<div class="bg-surface border border-outline-variant p-md rounded flex flex-col gap-xs relative group overflow-hidden">
<div class="absolute top-0 left-0 w-full h-1 bg-surface-container-highest"></div>
<span class="font-label-compact text-label-compact text-on-surface-variant uppercase tracking-widest">LEVEL</span>
<span class="font-data-mono text-data-mono text-secondary group-hover:text-secondary-fixed transition-colors">08</span>
</div>
</div>
<!-- Action Buttons -->
<div class="flex flex-col w-full gap-md mt-md">
<!-- Primary Action: Resume -->
<button class="w-full h-14 bg-transparent border-2 border-secondary text-secondary font-h2-hud text-h2-hud flex items-center justify-center gap-sm hover:bg-secondary/10 hover:shadow-[0_0_15px_rgba(74,225,118,0.3)] transition-all duration-150 active:bg-secondary/30 active:scale-[0.98] rounded group">
<span class="material-symbols-outlined text-secondary group-hover:scale-110 transition-transform">play_arrow</span>
                    Resume
                </button>
<!-- Secondary Action: Restart -->
<button class="w-full h-12 bg-transparent border border-outline-variant text-on-surface font-body-bold text-body-bold flex items-center justify-center gap-sm hover:bg-surface-container-highest hover:border-outline transition-all duration-150 active:scale-[0.98] rounded">
<span class="material-symbols-outlined text-on-surface-variant">refresh</span>
                    Restart
                </button>
<!-- Secondary Action: Return to Main Menu -->
<button class="w-full h-12 bg-transparent border border-outline-variant text-on-surface font-body-bold text-body-bold flex items-center justify-center gap-sm hover:bg-surface-container-highest hover:border-outline transition-all duration-150 active:scale-[0.98] rounded">
<span class="material-symbols-outlined text-on-surface-variant">logout</span>
                    Return to Main Menu
                </button>
</div>
<!-- Minimal decorative corners -->
<div class="absolute top-0 left-0 w-4 h-4 border-t-2 border-l-2 border-outline-variant rounded-tl-sm -translate-x-1 -translate-y-1"></div>
<div class="absolute top-0 right-0 w-4 h-4 border-t-2 border-r-2 border-outline-variant rounded-tr-sm translate-x-1 -translate-y-1"></div>
<div class="absolute bottom-0 left-0 w-4 h-4 border-b-2 border-l-2 border-outline-variant rounded-bl-sm -translate-x-1 translate-y-1"></div>
<div class="absolute bottom-0 right-0 w-4 h-4 border-b-2 border-r-2 border-outline-variant rounded-br-sm translate-x-1 translate-y-1"></div>
</div>
</div>
</body></html>
